<section class="welcome-box">

<select id="kyThi">

</a>

            Chọn kỳ thi

        <option>

        </option>

        <option>

        </option>

        <option>

        </option>

    </select>
    <br>
        <button class="enter-btn"
        onclick="vaoHeThong()">

    VÀO HỆ THỐNG

</button>
<script>
function vaoHeThong(){

    let kyThi =
    document.getElementById("kyThi").value;

    if(kyThi === "Chọn kỳ thi"){

        alert(
        "Vui lòng chọn kỳ thi!"
        );

        return;
    }

    localStorage.setItem(
        "kyThi",
        kyThi
    );

    window.location.href =
    "xacnhan.html";
}

const CSV_URLS = [

"https://docs.google.com/spreadsheets/d/e/2PACX-1vTpyBmphKKF3lC2YXtIAU7GZO0R7te1Orvoi8KqmHx-PbMKfl2r8iNwz5Z5PA2iUr5ol9A1-AraIMvi/pub?output=csv",

"https://docs.google.com/spreadsheets/d/e/2PACX-1vTQi1mhGw-K9xsKeYgqpe-n3XvALt-PcPb-oOkVxHJ2CLhyfy9QlzkgWnNK24zjQCWmO5q_YuMy5Sga/pub?output=csv",

"https://docs.google.com/spreadsheets/d/e/2PACX-1vQtvs9nZ-1ab-DR-rekNM37FXv65Xz8va5RX-98kdy6kbCRrIZIaeO5GgPDZDZdklho2Wk2OuJx-yzZ/pub?output=csv",

"https://docs.google.com/spreadsheets/d/e/2PACX-1vT1XU2cW4LBuNHihn58r7svCjjtN06q_1e6BndfbPH6yja2nHhadihWkZIBzr7CSnWO5YLeGxMneJJK/pub?output=csv"

];
const btn =
document.getElementById(
"taiKhoanBtn"
);

if(btn){

    btn.addEventListener(
    "click",
    function(e){

        if(
        localStorage.getItem(
        "dangNhap"
        ) === "true"
        ){

            e.preventDefault();

            const menu =
            document.getElementById(
            "userDropdown"
            );

            menu.style.display =
            menu.style.display ===
            "block"
            ? "none"
            : "block";

        }

    });

}
function kiemTraDangNhap(){

    const dangNhap =
    localStorage.getItem("dangNhap");

    const hoTen =
    localStorage.getItem("hoTen");

    const btn =
    document.getElementById("taiKhoanBtn");

    if(!btn) return;

    if(dangNhap === "true"){

        btn.innerHTML =
        hoTen + " ▼";

        btn.href = "#";

    }else{

        btn.innerHTML =
        "Đăng nhập";

        btn.href =
        "login.html";

    }

}

kiemTraDangNhap();
function dangXuat(){

    if(
    confirm(
    "Bạn muốn đăng xuất?"
    )
    ){

        localStorage.clear();

        window.location.href =
        "index.html";

    }

}
document.getElementById(
"tenHocSinh"
).innerText =
"Xin chào, " +
localStorage.getItem(
"hoTen"
);

document.getElementById(
"lopHocSinh"
).innerText =
"Lớp: " +
localStorage.getItem(
"lopThiSinh"
);
if(
localStorage.getItem(
"dangNhap"
)!=="true"
){
    window.location.href =
    "login.html";
}
</script>
</body>
</html>
