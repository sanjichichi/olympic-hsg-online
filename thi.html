<!DOCTYPE html>
<html lang="vi">

    <span id="tenThiSinh"></span>

    <span id="ngaySinh"></span>
</div>

    <div>

    <span id="lopThiSinh"></span>
        </div>
            <div>

        </div>

             <span id="soCauDaLam">0</span>/<span id="tongSoCau">0</span> câu
        </div>

    <div id="khuVucCauHoi">
    </div>
    <button
    class="submit-btn"
    onclick="nopBai()">

    NỘP BÀI

    </button>
    </div>

<div class="question-nav">

    </div>

</div>
