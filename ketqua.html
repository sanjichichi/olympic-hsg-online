<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Kết quả bài thi</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="login-page">

<div class="login-container">

<h1>🏆 KẾT QUẢ BÀI THI</h1>

<p>
<strong>Họ tên:</strong>
<span id="hoTen"></span>
</p>

<p>
<strong>Lớp:</strong>
<span id="lop"></span>
</p>

<p>
<strong>Ngày sinh:</strong>
<span id="ngaySinh"></span>
</p>

<p>
<strong>Kỳ thi:</strong>
<span id="kyThi"></span>
</p>

<hr>

<p>
<strong>Số câu đúng:</strong>
<span id="soDung"></span>
</p>

<p>
<strong>Số câu sai:</strong>
<span id="soSai"></span>
</p>

<p>
<strong>Điểm:</strong>
<span id="diem"></span>
</p>

<p>
<strong>Tỷ lệ đúng:</strong>
<span id="tyLe"></span>
</p>
<p>
<strong>Xếp loại:</strong>
<span id="xepLoai"></span>
</p>
<div class="badge-box">

    <div id="huyHieu"></div>

</div>
<button onclick="veTrangChu()">

🏠 VỀ TRANG CHỦ

</button>

</div>

</div>

<script>
console.log("Ketqua.html đã chạy");
const APP_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw-x0Gq26x-1_IkA-PU4nIKCKPomoQ0BHq1yodh3bqJaf5F4Leo9E8lr0rI1-WiiMPJvw/exec";

document.getElementById("hoTen")
.innerHTML =
localStorage.getItem(
"tenThiSinh"
);

document.getElementById("lop")
.innerHTML =
localStorage.getItem(
"lopThiSinh"
);

document.getElementById("ngaySinh")
.innerHTML =
localStorage.getItem(
"ngaySinh"
);

document.getElementById("kyThi")
.innerHTML =
localStorage.getItem(
"kythi"
);

let diem =
Number(
localStorage.getItem(
"diemThi"
)
);

let tong =
Number(
localStorage.getItem(
"tongSoCau"
)
);

let sai =
Number(
localStorage.getItem(
"soCauSai"
)
);

let tyLe =
Math.round(
diem / tong * 100
);
let xepLoai = "";

if(tyLe >= 90){

    xepLoai = "🏆 Xuất sắc";

}
else if(tyLe >= 80){

    xepLoai = "🥇 Giỏi";

}
else if(tyLe >= 65){

    xepLoai = "🥈 Khá";

}
else if(tyLe >= 50){

    xepLoai = "🥉 Đạt";

}
else{

    xepLoai = "📚 Cần cố gắng";

}

document.getElementById("soDung")
.innerHTML = diem;

document.getElementById("soSai")
.innerHTML = sai;

document.getElementById("diem")
.innerHTML =
diem + "/" + tong;

document.getElementById("tyLe")
.innerHTML =
tyLe + "%";
guiKetQua();
document.getElementById("xepLoai")
.innerHTML =
xepLoai;
let huyHieu = document.getElementById(
"huyHieu"
);

if(tyLe >= 90){

    huyHieu.innerHTML =
    "🏆 HUY HIỆU VÀNG";

    huyHieu.style.background =
    "#ffd700";

}
else if(tyLe >= 80){

    huyHieu.innerHTML =
    "🥇 HUY HIỆU BẠC";

    huyHieu.style.background =
    "#c0c0c0";

}
else if(tyLe >= 65){

    huyHieu.innerHTML =
    "🥉 HUY HIỆU ĐỒNG";

    huyHieu.style.background =
    "#cd7f32";

}
else{

    huyHieu.innerHTML =
    "📚 TIẾP TỤC CỐ GẮNG";

    huyHieu.style.background =
    "#e0e0e0";

}

async function guiKetQua(){

    console.log("Đang gửi điểm");

    try{

        let res = await fetch(
        APP_SCRIPT_URL,
        {
            method:"POST",

            body:JSON.stringify({

                hoten:
                localStorage.getItem("tenThiSinh"),

                lop:
                localStorage.getItem("lopThiSinh"),

                ngaysinh:
                localStorage.getItem("ngaySinh"),

                kythi:
                localStorage.getItem("kythi"),

                diem:diem,

                tongcau:tong,

                tyle:tyLe

            })
        });

        console.log(
            "Status:",
            res.status
        );

        let text =
        await res.text();

        console.log(
            "Phản hồi:",
            text
        );

    }

    catch(error){

        console.log(
            "Lỗi gửi:",
            error
        );

    }

}

function veTrangChu(){

    localStorage.clear();

    window.location.href =
    "index.html";

}

</script>

</body>

</html>
