<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Kết quả bài thi</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="login-page">

<div class="login-container">

<h1>🏆 KẾT QUẢ BÀI THI</h1>

<p>
<strong>Họ tên:</strong>
<span id="hoTen"></span>
</p>

<p>
<strong>Lớp:</strong>
<span id="lop"></span>
</p>

<p>
<strong>Ngày sinh:</strong>
<span id="ngaySinh"></span>
</p>

<p>
<strong>Kỳ thi:</strong>
<span id="kyThi"></span>
</p>

<hr>

<p>
<strong>Số câu đúng:</strong>
<span id="soDung"></span>
</p>

<p>
<strong>Số câu sai:</strong>
<span id="soSai"></span>
</p>

<p>
<strong>Điểm:</strong>
<span id="diem"></span>
</p>

<p>
<strong>Tỷ lệ đúng:</strong>
<span id="tyLe"></span>
</p>
<p>
<strong>Xếp loại:</strong>
<span id="xepLoai"></span>
</p>
<div class="badge-box">

    <div id="huyHieu"></div>

</div>
<button onclick="veTrangChu()">

🏠 VỀ TRANG CHỦ

</button>

</div>

</div>

<script>
console.log("Ketqua.html đã chạy");
const APP_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzONtyapyK0VX--g0BuaHXAMo4gFpZB6xGsFtH_UTgZutZ0weOcxhijTcJXrEwjtaD9Cw/exec";

document.getElementById("hoTen")
.innerHTML =
localStorage.getItem(
"tenThiSinh"
);

document.getElementById("lop")
.innerHTML =
localStorage.getItem(
"lopThiSinh"
);

document.getElementById("ngaySinh")
.innerHTML =
localStorage.getItem(
"ngaySinh"
);

document.getElementById("kyThi")
.innerHTML =
localStorage.getItem(
"kyThi"
);

let diem =
Number(
localStorage.getItem(
"diemThi"
)
);

let tong =
Number(
localStorage.getItem(
"tongSoCau"
)
);

let sai =
Number(
localStorage.getItem(
"soCauSai"
)
);

let tyLe =
Math.round(
diem / tong * 100
);
let xepLoai = "";

if(tyLe >= 90){

    xepLoai = "🏆 Xuất sắc";

}
else if(tyLe >= 80){

    xepLoai = "🥇 Giỏi";

}
else if(tyLe >= 65){

    xepLoai = "🥈 Khá";

}
else if(tyLe >= 50){

    xepLoai = "🥉 Đạt";

}
else{

    xepLoai = "📚 Cần cố gắng";

}

document.getElementById("soDung")
.innerHTML = diem;

document.getElementById("soSai")
.innerHTML = sai;

document.getElementById("diem")
.innerHTML =
diem + "/" + tong;

document.getElementById("tyLe")
.innerHTML =
tyLe + "%";
guiKetQua();
document.getElementById("xepLoai")
.innerHTML =
xepLoai;
let huyHieu = document.getElementById(
"huyHieu"
);

if(tyLe >= 90){

    huyHieu.innerHTML =
    "🏆 HUY HIỆU VÀNG";

    huyHieu.style.background =
    "#ffd700";

}
else if(tyLe >= 80){

    huyHieu.innerHTML =
    "🥇 HUY HIỆU BẠC";

    huyHieu.style.background =
    "#c0c0c0";

}
else if(tyLe >= 65){

    huyHieu.innerHTML =
    "🥉 HUY HIỆU ĐỒNG";

    huyHieu.style.background =
    "#cd7f32";

}
else{

    huyHieu.innerHTML =
    "📚 TIẾP TỤC CỐ GẮNG";

    huyHieu.style.background =
    "#e0e0e0";

}

async function guiKetQua(){
    console.log(
    "Mã HS:",
    localStorage.getItem("maThiSinh")
);

    let formData = new FormData();

    formData.append(
    "entry.692679506",
    localStorage.getItem(
        "maThiSinh"
    )
    );

    formData.append(
        "entry.805102074",
        localStorage.getItem("tenThiSinh")
    );

    formData.append(
        "entry.423243862",
        localStorage.getItem("lopThiSinh")
    );
    

    formData.append(
        "entry.2016044064",
        localStorage.getItem("kyThi")
    );

    formData.append(
        "entry.1986781729",
        diem
    );

    formData.append(
        "entry.1287135276",
        tong
    );

    formData.append(
        "entry.1019226016",
        tyLe
    );

    formData.append(
        "entry.1223259505",
        localStorage.getItem("thoiGianHoanThanh")
    );

console.log("Mã HS:", localStorage.getItem("maThiSinh"));
console.log("Họ tên:", localStorage.getItem("tenThiSinh"));
console.log("Lớp:", localStorage.getItem("lopThiSinh"));
console.log("Ngày sinh:", localStorage.getItem("ngaySinh"));
console.log("Kỳ thi:", localStorage.getItem("kyThi"));
console.log("Điểm:", diem);
console.log("Tổng:", tong);
console.log("Tỷ lệ:", tyLe);
console.log("Thời gian:", localStorage.getItem("thoiGianHoanThanh"));
console.log("Rời tab:", localStorage.getItem("soLanRoiTab"));
    fetch(
        "https://docs.google.com/forms/d/e/1FAIpQLSdyjJ_dxE6UO8IFhOml8BNwcOYCyblAFaHQpxJajOMr9c4L1w/formResponse",
        {
            method:"POST",
            mode:"no-cors",
            body:formData
        }
    );

    console.log("Đã gửi kết quả lên Google Form");

}

function veTrangChu(){

    localStorage.clear();

    window.location.href =
    "index.html";

}

</script>

</body>

</html>
